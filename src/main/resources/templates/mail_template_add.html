<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>メールテンプレート追加</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" />
  </head>
  <body>
    <main class="page-shell">
      <header class="page-header">
        <h1>メールテンプレート追加</h1>
        <nav class="page-actions" aria-label="テンプレート操作">
          <a class="button button-ghost" th:href="@{/mail/template/list}">戻る</a>
        </nav>
      </header>

      <section class="form-panel">
        <form
          class="app-form"
          th:action="@{/mail/template/create}"
          th:object="${mailTemplateForm}"
          method="post"
        >
          <div class="form-field">
            <label for="templateName">テンプレート名</label>
            <input type="text" th:field="*{templateName}" />
          </div>
          <div class="form-field">
            <label for="templateText">テンプレート本文</label>
            <textarea th:field="*{templateText}"></textarea>
          </div>
          <div class="form-actions">
            <button class="button button-primary" type="submit">保存</button>
          </div>
        </form>
      </section>
    </main>
  </body>
</html>
