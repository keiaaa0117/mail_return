<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>メールテンプレート一覧</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" />
  </head>
  <body>
    <main class="page-shell">
      <header class="page-header">
        <h1>メールテンプレート一覧</h1>

        <nav class="page-actions" aria-label="テンプレート操作">
          <a class="button button-primary" th:href="@{/mail/template/create}">
            テンプレート追加
          </a>
          <a class="button button-ghost" th:href="@{/mail/list}">戻る</a>
        </nav>
      </header>

      <section class="table-panel">
        <table class="data-table">
          <thead>
            <tr>
              <th>テンプレート番号</th>
              <th>テンプレート名</th>
              <th>テンプレート本文</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody>
            <tr th:if="${#lists.isEmpty(templateList)}">
              <td class="empty-state" colspan="4">テンプレートがありません。</td>
            </tr>
            <tr th:each="template : ${templateList}">
              <td
                class="id-cell"
                data-label="テンプレート番号"
                th:text="${template.templateId}"
              ></td>
              <td data-label="テンプレート名" th:text="${template.templateName}"></td>
              <td
                class="template-text"
                data-label="テンプレート本文"
                th:text="${template.templateText}"
              ></td>
              <td class="actions-cell" data-label="操作">
                <a
                  class="button button-outline"
                  th:href="@{/mail/template/edit/{id}(id=${template.templateId})}"
                >
                  編集
                </a>
                <form
                  th:action="@{/mail/template/delete/{id}(id=${template.templateId})}"
                  method="post"
                  class="inline-form"
                >
                  <button class="button button-danger" type="submit">削除</button>
                </form>
              </td>
            </tr>
          </tbody>
        </table>
      </section>
    </main>
  </body>
</html>
