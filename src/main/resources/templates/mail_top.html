<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <title>Mail List</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" />
  </head>
  <body>
    <h1>Mail List</h1>

    <p>
      <a th:href="@{/mail/create}"><button type="button">Create Mail</button></a>
    </p>

    <table border="1">
      <thead>
        <tr>
          <th>ID</th>
          <th>Subject</th>
          <th>Message</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr th:if="${#lists.isEmpty(mailList)}">
          <td colspan="4">No mail found.</td>
        </tr>
        <tr th:each="mail : ${mailList}">
          <td th:text="${mail.id}"></td>
          <td th:text="${mail.subject}"></td>
          <td th:text="${mail.message}"></td>
          <td>
            <a th:href="@{/mail/edit/{id}(id=${mail.id})}">
              <button type="button">Edit</button>
            </a>
            <button
              type="button"
              th:attr="data-id=${mail.id},data-subject=${mail.subject}"
              onclick="openDeleteModal(this)"
            >
              Delete
            </button>
          </td>
        </tr>
      </tbody>
    </table>

    <div id="deleteModal" class="modal">
      <div class="modal-content">
        <p id="modalText"></p>
        <form id="deleteForm" method="post">
          <button type="submit">Delete</button>
          <button type="button" onclick="closeModal()">Cancel</button>
        </form>
      </div>
    </div>

    <script th:src="@{/js/modal.js}"></script>
  </body>
</html>
