<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>メール一覧</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" />
  </head>
  <body>
    <main class="page-shell">
      <header class="page-header">
        <h1>メール一覧</h1>

        <nav class="page-actions" aria-label="メール操作">
          <a class="button button-primary" th:href="@{/mail/create}">新規作成</a>
          <a class="button button-secondary" th:href="@{/mail/template/list}">
            テンプレート一覧
          </a>
        </nav>
      </header>

      <section class="table-panel">
        <table class="data-table">
          <thead>
            <tr>
              <th>メール番号</th>
              <th>件名</th>
              <th>本文</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody>
            <tr th:if="${#lists.isEmpty(mailList)}">
              <td class="empty-state" colspan="4">メールがありません。</td>
            </tr>
            <tr th:each="mail : ${mailList}">
              <td class="id-cell" data-label="メール番号" th:text="${mail.id}"></td>
              <td data-label="件名" th:text="${mail.subject}"></td>
              <td
                class="message-cell"
                data-label="本文"
                th:text="${mail.message}"
              ></td>
              <td class="actions-cell" data-label="操作">
                <a
                  class="button button-outline"
                  th:href="@{/mail/edit/{id}(id=${mail.id})}"
                >
                  編集
                </a>
                <button
                  class="button button-danger"
                  type="button"
                  th:attr="data-id=${mail.id},data-subject=${mail.subject}"
                  onclick="openDeleteModal(this)"
                >
                  削除
                </button>
              </td>
            </tr>
          </tbody>
        </table>
      </section>

      <div
        id="deleteModal"
        class="modal"
        role="dialog"
        aria-modal="true"
        aria-labelledby="deleteModalTitle"
      >
        <div class="modal-content">
          <h2 id="deleteModalTitle">メール削除</h2>
          <p id="modalText"></p>
          <form id="deleteForm" class="modal-actions" method="post">
            <button class="button button-danger" type="submit">削除</button>
            <button class="button button-ghost" type="button" onclick="closeModal()">
              キャンセル
            </button>
          </form>
        </div>
      </div>
    </main>

    <script th:src="@{/js/modal.js}"></script>
  </body>
</html>
